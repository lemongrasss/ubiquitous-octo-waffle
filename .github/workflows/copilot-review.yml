name: Copilot Agent Review

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to run the Copilot coding agent on'
        required: true
        type: number

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  start-copilot-agent:
    # Trigger on workflow_dispatch or when the doc-review label is applied
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'doc-review'
    runs-on: ubuntu-latest
    steps:
      - name: Start Copilot coding agent session
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          ISSUE_NUMBER="${{ github.event.inputs.issue_number || github.event.issue.number }}"
          echo "Starting Copilot coding agent for issue #${ISSUE_NUMBER}..."

          # Trigger Copilot coding agent to work on this issue.
          # Requires Copilot coding agent to be enabled for this repository.
          # See: https://docs.github.com/en/copilot/using-github-copilot/using-copilot-coding-agent
          gh api \
            --method POST \
            "repos/${{ github.repository }}/copilot/coding_agent/sessions" \
            -F "issue_number=${ISSUE_NUMBER}" \
            && echo "Copilot coding agent session started for issue #${ISSUE_NUMBER}" \
            || echo "::warning::Could not start Copilot coding agent session. Ensure Copilot coding agent is enabled for this repository and the token has sufficient permissions."
