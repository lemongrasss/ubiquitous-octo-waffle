name: Agentic Document Review

on:
  schedule:
    # Run daily at 9am UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      skip_threshold:
        description: 'Skip the staleness threshold (treat all docs as stale)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  review-documents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identify stale docs and create review issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_THRESHOLD_DAYS: 30
          TEAM_ORG: lemongrasss
          TEAM_SLUG: matts-test-team
        run: |
          set -e

          THRESHOLD_DAYS="${REVIEW_THRESHOLD_DAYS:-30}"
          THRESHOLD_DATE=$(date -d "-${THRESHOLD_DAYS} days" +%Y-%m-%dT%H:%M:%S 2>/dev/null \
            || date -v-${THRESHOLD_DAYS}d +%Y-%m-%dT%H:%M:%S)

          echo "Review threshold: documents not modified in the last ${THRESHOLD_DAYS} days"
          echo "Threshold date: ${THRESHOLD_DATE}"

          # Get team members from GitHub team API
          TEAM_MEMBERS=""
          if API_OUTPUT=$(gh api \
            "orgs/${TEAM_ORG}/teams/${TEAM_SLUG}/members" \
            --jq 'if type == "array" then .[].login else empty end' 2>/dev/null); then
            TEAM_MEMBERS="$API_OUTPUT"
          fi

          if [ -z "$TEAM_MEMBERS" ]; then
            echo "::warning::Could not fetch team members from ${TEAM_ORG}/${TEAM_SLUG}. Proceeding without assignee."
          else
            echo "Team members: $(echo "$TEAM_MEMBERS" | tr '\n' ', ')"
          fi

          # Get recent issues (last 30 days, open and recently closed) for context
          RECENT_ISSUES=$(gh issue list \
            --state all \
            --limit 20 \
            --json number,title,state,labels,closedAt,createdAt \
            --jq '[.[] | select(
              (.state == "OPEN") or
              (.closedAt != null and (.closedAt | fromdateiso8601) > (now - (30 * 86400)))
            )] | map("- #\(.number) [\(.state)]: \(.title)") | join("\n")' 2>/dev/null || echo "No recent issues found.")

          echo "Recent issues context collected."

          # Check each doc file for staleness using git commit timestamps
          STALE_DOCS=""
          for doc in docs/*.md; do
            [ -f "$doc" ] || continue

            # If skip_threshold is true, mark all docs as needing review
            if [ "${{ github.event.inputs.skip_threshold || 'false' }}" = "true" ]; then
              echo "SKIP THRESHOLD: marking ${doc} as stale (testing mode)"
              STALE_DOCS="${STALE_DOCS}${doc} (threshold skipped)\n"
              continue
            fi

            # Get the last commit date for this file
            LAST_COMMIT_DATE=$(git log -1 --format="%aI" -- "$doc" 2>/dev/null || echo "")

            if [ -z "$LAST_COMMIT_DATE" ]; then
              echo "No git history for ${doc}, marking as needing review."
              STALE_DOCS="${STALE_DOCS}${doc}\n"
              continue
            fi

            # Compare dates
            LAST_COMMIT_TS=$(date -d "$LAST_COMMIT_DATE" +%s 2>/dev/null \
              || date -jf "%Y-%m-%dT%H:%M:%S" "$(echo "$LAST_COMMIT_DATE" | cut -c1-19)" +%s)
            THRESHOLD_TS=$(date -d "$THRESHOLD_DATE" +%s 2>/dev/null \
              || date -jf "%Y-%m-%dT%H:%M:%S" "$THRESHOLD_DATE" +%s)

            if [ "$LAST_COMMIT_TS" -lt "$THRESHOLD_TS" ]; then
              LAST_COMMIT_HUMAN=$(echo "$LAST_COMMIT_DATE" | cut -c1-10)
              echo "STALE: ${doc} (last modified: ${LAST_COMMIT_HUMAN})"
              STALE_DOCS="${STALE_DOCS}${doc} (last modified: ${LAST_COMMIT_HUMAN})\n"
            else
              echo "OK: ${doc} (recently modified)"
            fi
          done

          if [ -z "$STALE_DOCS" ]; then
            echo "All documents are up to date. No review needed."
            exit 0
          fi

          # Check for an existing open review issue to avoid duplicates
          EXISTING_ISSUE=$(gh issue list \
            --label "doc-review" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Open doc-review issue #${EXISTING_ISSUE} already exists. Skipping."
            exit 0
          fi

          # Ensure the doc-review label exists
          gh label create "doc-review" \
            --description "Automated documentation review" \
            --color "0075ca" 2>/dev/null || true

          # Pick a random team member for oversight
          ASSIGNEE_FLAG=""
          if [ -n "$TEAM_MEMBERS" ]; then
            MEMBER_COUNT=$(echo "$TEAM_MEMBERS" | wc -l | tr -d ' ')
            RANDOM_INDEX=$((RANDOM % MEMBER_COUNT + 1))
            SELECTED_MEMBER=$(echo "$TEAM_MEMBERS" | sed -n "${RANDOM_INDEX}p")
            if [ -n "$SELECTED_MEMBER" ]; then
              ASSIGNEE_FLAG="--assignee ${SELECTED_MEMBER}"
              echo "Selected team member for oversight: ${SELECTED_MEMBER}"
            fi
          fi

          # Build the stale docs list for the issue body
          STALE_LIST=$(echo -e "$STALE_DOCS" | sed '/^$/d' | while read -r line; do echo "- \`${line}\`"; done)

          # Build the issue body
          ISSUE_BODY=$(cat <<'ISSUE_TEMPLATE'
          ## 📋 Automated Documentation Review

          The following documentation files have not been updated in over **THRESHOLD_PLACEHOLDER days** and need review:

          STALE_PLACEHOLDER

          ### Instructions

          Please review each of the above documents and create a pull request with improvements. Consider:

          1. **Accuracy** — Is the content still correct? Are there outdated references?
          2. **Completeness** — Is anything missing that should be documented?
          3. **Clarity** — Can the language be clearer or more concise?
          4. **Relevance** — Does the document reflect the current state of the project?

          ### Recent Repository Issues for Context

          The following issues have been recently opened or closed. Use these to inform whether documentation needs updating:

          ISSUES_PLACEHOLDER

          ### Guidelines

          - Review each stale document listed above
          - Make meaningful content improvements where the documentation is lacking
          - Ensure documentation aligns with any changes referenced in recent issues
          - Create a single pull request with all documentation updates
          ISSUE_TEMPLATE
          )

          # Substitute placeholders
          ISSUE_BODY="${ISSUE_BODY//THRESHOLD_PLACEHOLDER/$THRESHOLD_DAYS}"
          ISSUE_BODY="${ISSUE_BODY//STALE_PLACEHOLDER/$STALE_LIST}"
          ISSUE_BODY="${ISSUE_BODY//ISSUES_PLACEHOLDER/${RECENT_ISSUES:-"No recent issues found."}}"

          # Create the issue
          ISSUE_URL=$(gh issue create \
            --title "docs: review stale documentation" \
            --body "$ISSUE_BODY" \
            --label "doc-review" \
            $ASSIGNEE_FLAG)

          echo "Created review issue: ${ISSUE_URL}"
